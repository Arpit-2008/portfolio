<!DOCTYPE html>
<html>
<head>
  <title>Cloud Server Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([25.76, 84.15], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    var marker;

    // Load location from server
    async function loadLocation() {
      const res = await fetch("/locations");
      const data = await res.json();
      if(data.length > 0) {
        let last = data[data.length - 1];
        let lat = last.latitude;
        let lng = last.longitude;

        if(!marker){
          marker = L.marker([lat,lng]).addTo(map);
        } else {
          marker.setLatLng([lat,lng]);
        }
        map.setView([lat,lng], 13);
      }
    }
    setInterval(loadLocation, 3000);

    // Send GPS to server
    function sendLocation(position){
      let lat = position.coords.latitude;
      let lng = position.coords.longitude;
      fetch("/location", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ deviceId: "phone1", latitude: lat, longitude: lng })
      });
    }

    function error(){ console.log("Location permission denied"); }
    setInterval(()=>{ navigator.geolocation.getCurrentPosition(sendLocation, error); }, 5000);
  </script>
</body>
</html>
